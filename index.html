<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST NIVA SELL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0f1e;
            color: white;
            min-height: 100vh;
        }
        
        .container {
            padding: 16px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        /* হেডার */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .username {
            color: #00ff88;
            font-weight: 500;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a0f1e;
        }
        
        /* সাকসেস কার্ড */
        .success-card {
            background: #1a1f30;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #00ff88;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .success-card:active {
            transform: scale(0.98);
        }
        
        .success-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .success-number {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
        }
        
        /* জয়েন বাটন */
        .join-btn {
            background: #00ff88;
            color: #0a0f1e;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        /* মার্কেট সেকশন */
        .market-section {
            background: #1a1f30;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .market-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .market-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .admin-rate-badge {
            background: #2a2f40;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #00ff88;
        }
        
        .online-badge {
            background: #00ff88;
            color: #0a0f1e;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        /* কয়েন কার্ড */
        .coin-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 15px 0;
        }
        
        .coin-card {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #2a2f40;
            transition: 0.3s;
            cursor: pointer;
        }
        
        .coin-card:active {
            transform: scale(0.98);
            border-color: #00ff88;
        }
        
        .coin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .coin-name {
            font-size: 20px;
            font-weight: bold;
        }
        
        .coin-badge {
            background: #00ff88;
            color: #0a0f1e;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .coin-rate-box {
            background: #1a1f30;
            border-radius: 12px;
            padding: 12px;
        }
        
        .rate-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2f40;
        }
        
        .rate-row:last-child {
            border-bottom: none;
        }
        
        .rate-label {
            color: #888;
        }
        
        .rate-value {
            font-weight: 600;
            color: #00ff88;
        }
        
        .sell-btn {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0a0f1e;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        /* অ্যাডমিন প্যানেল - আপনার ছবির মতো */
        .admin-container {
            padding: 20px;
        }
        
        .admin-header {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 10px;
        }
        
        .admin-subheader {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #1E2333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2A2F3F;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-pending { color: #ffaa00; }
        .stat-approved { color: #00ff88; }
        .stat-rejected { color: #ff4444; }
        
        .order-card {
            background: #1E2333;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2A2F3F;
        }
        
        .order-user {
            font-size: 18px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 15px;
        }
        
        .order-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .order-field {
            background: #0f1422;
            padding: 12px;
            border-radius: 12px;
        }
        
        .field-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .field-value {
            font-size: 16px;
            font-weight: 600;
        }
        
        .copy-section {
            background: #0f1422;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .copy-text {
            color: #00ff88;
            font-size: 16px;
        }
        
        .copy-button {
            background: #00ff88;
            color: #0a0f1e;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .approve-btn, .reject-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        
        .approve-btn {
            background: #00ff88;
            color: #0a0f1e;
        }
        
        .reject-btn {
            background: #ff4444;
            color: white;
        }
        
        .rate-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #2A2F3F;
        }
        
        .target-id {
            color: #888;
            font-size: 14px;
        }
        
        .target-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        .admin-login {
            text-align: center;
            padding: 30px;
        }
        
        .password-input {
            width: 100%;
            padding: 15px;
            background: #1E2333;
            border: 1px solid #2A2F3F;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin: 20px 0;
        }
        
        .login-btn {
            background: #00ff88;
            color: #0a0f1e;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- হোম পেজ -->
    <div id="homePage">
        <div class="container">
            <div class="header">
                <div class="logo">
                    <h1>FAST NIVA SELL</h1>
                </div>
                <div class="user-info">
                    <span class="username" id="username">@xhuv0900</span>
                    <div class="avatar" id="avatar">X</div>
                </div>
            </div>

            <div class="success-card" onclick="showHistory()">
                <div class="success-label">SUCCESS</div>
                <div class="success-number" id="successCount">0</div>
            </div>

            <button class="join-btn" onclick="joinChannel()">
                <span>📢</span> Join Channel
            </button>

            <div class="market-section">
                <div class="market-header">
                    <span class="market-title">Coin Market</span>
                    <span class="admin-rate-badge">100K+ = Admin Rate</span>
                </div>
                
                <div class="online-badge">⭕ ONLINE</div>

                <div class="coin-section">
                    <!-- Niva Coin -->
                    <div class="coin-card" onclick="selectCoin('niva')">
                        <div class="coin-header">
                            <span class="coin-name">Niva Coin</span>
                            <span class="coin-badge">2.8₮</span>
                        </div>
                        <div class="coin-rate-box">
                            <div class="rate-row">
                                <span class="rate-label">Per 1000</span>
                                <span class="rate-value">2.8₮</span>
                            </div>
                        </div>
                    </div>

                    <!-- Ns Coin -->
                    <div class="coin-card" onclick="selectCoin('ns')">
                        <div class="coin-header">
                            <span class="coin-name">Ns Coin</span>
                            <span class="coin-badge" style="background: #ffaa00;">11₮</span>
                        </div>
                        <div class="coin-rate-box">
                            <div class="rate-row">
                                <span class="rate-label">Per 1000</span>
                                <span class="rate-value">11₮</span>
                            </div>
                        </div>
                    </div>
                </div>

                <button class="sell-btn" onclick="goToSell()">TAP TO SELL</button>
            </div>
        </div>
    </div>

    <!-- সেল ফর্ম পেজ -->
    <div id="sellPage" style="display: none;">
        <div class="container">
            <button class="join-btn" onclick="showHomePage()">← Back</button>
            
            <div class="send-box">
                <div class="send-label">📤 SEND TO</div>
                <div class="send-id">
                    <span class="id-text">niva_buyer_zone_1</span>
                    <button class="copy-btn" onclick="copyId()">COPY</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">💰 Amount (Min 1000)</label>
                <input type="number" class="form-input" id="amount" min="1000" oninput="calcTotal()">
            </div>

            <div class="form-group">
                <label class="form-label">👤 Username</label>
                <input type="text" class="form-input" id="username">
            </div>

            <div class="form-group">
                <label class="form-label">🏦 Bkash</label>
                <input type="text" class="form-input" id="bkash">
            </div>

            <div class="rate-box2">
                <div class="rate-info">
                    <div class="rate-label2">Total</div>
                    <div class="total-value" id="total">0.00 ₺</div>
                </div>
            </div>

            <button class="next-btn" onclick="submitOrder()">Submit</button>
        </div>
    </div>

    <!-- অ্যাডমিন প্যানেল - আপনার ছবির মতো -->
    <div id="adminPage" style="display: none;">
        <div class="container admin-container">
            <div class="admin-header">⚡ ADMIN COMMAND CENTER</div>
            <div class="admin-subheader">Manage Orders & Rates</div>

            <!-- পরিসংখ্যান -->
            <div class="stats-grid" id="adminStats">
                <div class="stat-box">
                    <div class="stat-label">⏳ PENDING</div>
                    <div class="stat-number stat-pending" id="pendingCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">✅ APPROVED</div>
                    <div class="stat-number stat-approved" id="approvedCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">❌ REJECTED</div>
                    <div class="stat-number stat-rejected" id="rejectedCount">0</div>
                </div>
            </div>

            <!-- অর্ডার লিস্ট -->
            <div id="ordersList"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // কনফিগারেশন
        const BOT_TOKEN = '8479046315:AAFmBZplaAJRWsa16xuveinsWCn400i7x3w';
        const ADMIN_ID = '7816083990';
        const ADMIN_PASSWORD = 'niva123';
        
        let selectedCoin = 'niva';
        const coinRates = { niva: 2.8, ns: 11 };
        const user = tg.initDataUnsafe?.user;
        
        // ইউজার ইনফো
        if (user?.username) {
            document.getElementById('username').value = '@' + user.username;
        }
        
        // পেজ নেভিগেশন
        function showHomePage() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('sellPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'none';
            loadSuccessCount();
        }
        
        function showSellPage() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('sellPage').style.display = 'block';
            document.getElementById('adminPage').style.display = 'none';
        }
        
        function showAdminPage() {
            // চেক করা যে ইউজার অ্যাডমিন কিনা
            if (user?.id != ADMIN_ID) {
                tg.showAlert('⛔ অনুমতি নেই! শুধু অ্যাডমিন এই পেজ দেখতে পারেন।');
                showHomePage();
                return;
            }
            
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('sellPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
            loadAdminData();
        }
        
        // অ্যাডমিন ডাটা লোড
        function loadAdminData() {
            let pending = 0, approved = 0, rejected = 0;
            let allOrders = [];
            
            // লোকাল স্টোরেজ থেকে অর্ডার সংগ্রহ
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('orders_')) {
                    try {
                        const orders = JSON.parse(localStorage.getItem(key));
                        const userId = key.replace('orders_', '');
                        
                        orders.forEach(order => {
                            allOrders.push({ ...order, userId });
                            
                            if (order.status === 'pending') pending++;
                            else if (order.status === 'approved') approved++;
                            else if (order.status === 'rejected') rejected++;
                        });
                    } catch (e) {}
                }
            }
            
            // পরিসংখ্যান আপডেট
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedCount').textContent = approved;
            document.getElementById('rejectedCount').textContent = rejected;
            
            // অর্ডার দেখানো
            displayOrders(allOrders.filter(o => o.status === 'pending'));
        }
        
        // অর্ডার দেখানো (আপনার ছবির মতো)
        function displayOrders(orders) {
            const container = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; padding:30px;">কোনো পেন্ডিং অর্ডার নেই</div>';
                return;
            }
            
            let html = '';
            orders.forEach(order => {
                html += `
                    <div class="order-card">
                        <div class="order-user">👤 ${order.sender || 'Unknown'}</div>
                        
                        <div class="order-grid">
                            <div class="order-field">
                                <div class="field-label">Coin</div>
                                <div class="field-value">${order.coin || 'Niva Coin'}</div>
                            </div>
                            <div class="order-field">
                                <div class="field-label">Method</div>
                                <div class="field-value">${order.method || 'Bkash'}</div>
                            </div>
                            <div class="order-field">
                                <div class="field-label">Amount</div>
                                <div class="field-value">${order.amount || '0'}</div>
                            </div>
                            <div class="order-field">
                                <div class="field-label">Payout</div>
                                <div class="field-value">${order.total || '0'}</div>
                            </div>
                        </div>
                        
                        <div class="copy-section">
                            <span class="copy-text">${order.account || 'N/A'}</span>
                            <button class="copy-button" onclick="copyNumber('${order.account}')">📋 COPY</button>
                        </div>
                        
                        <div class="rate-info">
                            <span class="target-id">Target ID: <span class="target-value">niva_buyer_zone_1</span></span>
                            <span class="target-id">Rate: <span class="target-value">2.8₮</span></span>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="approve-btn" onclick="updateOrder('${order.id}', '${order.userId}', 'approved')">✅ Approve</button>
                            <button class="reject-btn" onclick="updateOrder('${order.id}', '${order.userId}', 'rejected')">❌ Reject</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // অর্ডার আপডেট
        function updateOrder(orderId, userId, newStatus) {
            const key = `orders_${userId}`;
            const orders = JSON.parse(localStorage.getItem(key)) || [];
            const orderIndex = orders.findIndex(o => o.id === orderId);
            
            if (orderIndex !== -1) {
                orders[orderIndex].status = newStatus;
                localStorage.setItem(key, JSON.stringify(orders));
                
                if (newStatus === 'approved') {
                    // সাকসেস কাউন্ট বাড়ানো
                    const successKey = `successCount_${userId}`;
                    let count = parseInt(localStorage.getItem(successKey)) || 0;
                    localStorage.setItem(successKey, count + 1);
                    
                    tg.showAlert(`✅ অর্ডার এপ্রুভ করা হয়েছে! ইউজারের সাকসেস কাউন্ট +১ হয়েছে।`);
                } else {
                    tg.showAlert(`❌ অর্ডার রিজেক্ট করা হয়েছে।`);
                }
                
                loadAdminData();
            }
        }
        
        // কপি ফাংশন
        function copyNumber(number) {
            navigator.clipboard.writeText(number);
            tg.showAlert('✅ নাম্বার কপি করা হয়েছে!');
        }
        
        function copyId() {
            navigator.clipboard.writeText('niva_buyer_zone_1');
            tg.showAlert('✅ ID কপি করা হয়েছে!');
        }
        
        // টোটাল ক্যালকুলেট
        function calcTotal() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            if (amount >= 1000) {
                const total = (amount / 1000) * coinRates[selectedCoin];
                document.getElementById('total').textContent = total.toFixed(2) + ' ₺';
            }
        }
        
        function selectCoin(coin) {
            selectedCoin = coin;
            tg.showAlert(`${coin === 'niva' ? 'Niva' : 'Ns'} Coin সিলেক্টেড`);
            calcTotal();
        }
        
        // অর্ডার সাবমিট
        function submitOrder() {
            const amount = document.getElementById('amount').value;
            const username = document.getElementById('username').value;
            const bkash = document.getElementById('bkash').value;
            
            if (!amount || amount < 1000 || !username || !bkash) {
                tg.showAlert('⚠️ সব তথ্য দিন');
                return;
            }
            
            const total = (amount / 1000) * coinRates[selectedCoin];
            
            const newOrder = {
                id: 'ORD' + Date.now(),
                coin: selectedCoin === 'niva' ? 'Niva Coin' : 'Ns Coin',
                amount: amount,
                sender: username,
                method: 'Bkash',
                account: bkash,
                total: total.toFixed(2) + ' ₺',
                status: 'pending',
                time: new Date().toLocaleString()
            };
            
            const key = `orders_${user?.id || 'guest'}`;
            const orders = JSON.parse(localStorage.getItem(key)) || [];
            orders.push(newOrder);
            localStorage.setItem(key, JSON.stringify(orders));
            
            tg.showAlert('✅ অর্ডার পেন্ডিং আছে! অ্যাডমিন এপ্রুভ করার পর সাকসেস কাউন্ট বাড়বে।');
            showHomePage();
        }
        
        // জয়েন চ্যানেল
        function joinChannel() {
            tg.openTelegramLink('https://t.me/incomebd1k');
        }
        
        // Success Count লোড
        function loadSuccessCount() {
            const key = `successCount_${user?.id || 'guest'}`;
            const count = parseInt(localStorage.getItem(key)) || 0;
            document.getElementById('successCount').textContent = count;
        }
        
        // হিস্ট্রি দেখানো
        function showHistory() {
            const key = `orders_${user?.id || 'guest'}`;
            const orders = JSON.parse(localStorage.getItem(key)) || [];
            
            if (orders.length === 0) {
                tg.showAlert('📭 কোনো অর্ডার নেই');
                return;
            }
            
            let message = '📋 আপনার অর্ডার:\n\n';
            orders.slice(-5).reverse().forEach(o => {
                const status = o.status === 'approved' ? '✅' : o.status === 'rejected' ? '❌' : '⏳';
                message += `${status} ${o.amount} = ${o.total}\n`;
            });
            
            tg.showPopup({
                title: 'Order History',
                message: message,
                buttons: [{type: 'ok'}]
            });
        }
        
        // টেলিগ্রাম থেকে কমান্ড হ্যান্ডেল
        tg.onEvent('mainButtonClicked', function() {
            // কমান্ড হ্যান্ডেল
        });
        
        // অ্যাডমিন চেক
        if (user?.id == ADMIN_ID) {
            // অ্যাডমিন হলে /admin কমান্ড দেখানো
            console.log('Admin logged in');
        }
        
        // URL থেকে প্যারামিটার চেক
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('page') === 'admin') {
            showAdminPage();
        }
        
        // ইনিশিয়াল পেজ
        showHomePage();
    </script>
</body>
    </html>
