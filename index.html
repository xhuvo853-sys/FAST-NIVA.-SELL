<!doctype html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="://telegram.org/js/telegram-web-app.js&quot;"></script>
    <title>FAST NIVA SELL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #0a0f1e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
        }
        
        .container {
            padding: 16px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        /* হেডার সেকশন */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .username {
            color: #667eea;
            font-weight: 500;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* সাকসেস কার্ড */
        .success-card {
            background: linear-gradient(135deg, #1a1f30, #0f1422);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        
        .success-label {
            color: #8f9bb3;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .success-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        /* জয়েন বাটন */
        .join-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        /* কয়েন মার্কেট সেকশন */
        .market-section {
            background: #1a1f30;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2f40;
        }
        
        .market-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .market-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .admin-rate-badge {
            background: #2a2f40;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #8f9bb3;
        }
        
        .offline-badge {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        /* নাইভা কয়েন */
        .niva-coin {
            background: #0f1422;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .coin-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .rate-box {
            background: #1a1f30;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .rate-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2f40;
        }
        
        .rate-row:last-child {
            border-bottom: none;
        }
        
        .rate-label {
            color: #8f9bb3;
        }
        
        .rate-value {
            font-weight: 600;
            color: #667eea;
        }
        
        /* সেল বাটন */
        .sell-btn {
            background: linear-gradient(135deg, #00d09c, #00b894);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 208, 156, 0.3);
        }
        
        /* লাইভ রেট */
        .live-rate {
            background: linear-gradient(135deg, #1a1f30, #0f1422);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #667eea;
        }
        
        .live-rate-title {
            color: #8f9bb3;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .live-rate-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        /* ইউজার আইডি */
        .user-id-display {
            font-size: 12px;
            color: #8f9bb3;
            margin-top: 10px;
        }
        
        /* অ্যানিমেশন */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .live-rate-value {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- হেডার -->
        <div class="header">
            <div class="logo">
                <h1>FAST NIVA SELL</h1>
            </div>
            <div class="user-info">
                <span class="username" id="username">@xhuv0900</span>
                <div class="avatar" id="avatar">X</div>
            </div>
        </div>
        
        <!-- সাকসেস কার্ড -->
        <div class="success-card">
            <div class="success-label">SUCCESS</div>
            <div class="success-number" id="successCount">0</div>
        </div>
        
        <!-- জয়েন চ্যানেল বাটন -->
        <button class="join-btn" onclick="joinChannel()">
            <span>📢</span>
            Join Channel Updates, offers &amp; proofs
        </button>
        
        <!-- মার্কেট সেকশন -->
        <div class="market-section">
            <div class="market-header">
                <span class="market-title">Coin Market</span>
                <span class="admin-rate-badge">100K+ = Admin Rate</span>
            </div>
            
            <div class="offline-badge">⭕ OFFLINE</div>
            
            <!-- নাইভা কয়েন -->
            <div class="niva-coin">
                <div class="coin-name">Niva Coin</div>
                
                <div class="rate-box">
                    <div class="rate-row">
                        <span class="rate-label">User Rate</span>
                        <span class="rate-value" id="userRate">3.25₺</span>
                    </div>
                    <div class="rate-row">
                        <span class="rate-label">Admin Rate</span>
                        <span class="rate-value" id="adminRate">3.25₺</span>
                    </div>
                </div>
                
                <!-- সেল বাটন -->
                <button class="sell-btn" onclick="sellCoin()">
                    TAP TO SELL
                </button>
            </div>
        </div>
        
        <!-- লাইভ মার্কেট রেট -->
        <div class="live-rate">
            <div class="live-rate-title">LIVE MARKET RATE</div>
            <div class="live-rate-value" id="liveRate">3.25 ₺</div>
            <div class="user-id-display" id="userId"></div>
        </div>
    </div>
    
    <script>
        // টেলিগ্রাম ওয়েবঅ্যাপ ইনিশিয়ালাইজ
        let tg = Telegram.WebApp;
        tg.expand();
        
        // ইউজারের তথ্য লোড
        const user = tg.initDataUnsafe?.user;
        
        if (user) {
            // ইউজারনেম সেট
            if (user.username) {
                document.getElementById('username').textContent = '@' + user.username;
            } else {
                document.getElementById('username').textContent = user.first_name;
            }
            
            // অ্যাভাটার সেট
            document.getElementById('avatar').textContent = 
                user.first_name ? user.first_name.charAt(0).toUpperCase() : 'N';
            
            // ইউজার আইডি দেখান
            document.getElementById('userId').textContent = 'ID: ' + user.id;
        }
        
        // সাকসেস কাউন্ট (এটা ডাইনামিক করা যাবে)
        let successCount = 0;
        
        // জয়েন চ্যানেল ফাংশন
        function joinChannel() {
            tg.HapticFeedback.impactOccurred('light');
            
            tg.openTelegramLink('https://t.me/your_channel_link'); // আপনার চ্যানেল লিংক দিন
            
            // সাকসেস কাউন্ট বাড়ান
            successCount++;
            document.getElementById('successCount').textContent = successCount;
            
            tg.showPopup({
                title: '✅ জয়েন করেছেন!',
                message: 'চ্যানেলে জয়েন করার জন্য ধন্যবাদ',
                buttons: [{text: 'ঠিক আছে'}]
            });
        }
        
        // কয়েন সেল ফাংশন
        function sellCoin() {
            tg.HapticFeedback.impactOccurred('medium');
            
            tg.showPopup({
                title: '💰 নাইভা কয়েন সেল',
                message: 'আপনি কত কয়েন সেল করতে চান?',
                buttons: [
                    {id: '100', text: '100 কয়েন'},
                    {id: '500', text: '500 কয়েন'},
                    {id: '1000', text: '1000 কয়েন'},
                    {id: 'custom', text: 'কাস্টম পরিমাণ'},
                    {id: 'cancel', type: 'cancel', text: 'বাতিল'}
                ]
            }, function(buttonId) {
                if (buttonId !== 'cancel' && buttonId !== 'close') {
                    let amount = buttonId;
                    let total = parseFloat(amount) * 3.25;
                    
                    tg.showPopup({
                        title: '✅ অর্ডার কনফার্ম',
                        message: `${amount} NIVA = ${total.toFixed(2)}₺\n\nএডমিন শীঘ্রই যোগাযোগ করবে।`,
                        buttons: [{text: 'ঠিক আছে'}]
                    });
                }
            });
        }
        
        // লাইভ রেট আপডেট (ডেমো)
        setInterval(function() {
            let rate = 3.25;
            let change = (Math.random() * 0.1 - 0.05).toFixed(2);
            let newRate = (rate + parseFloat(change)).toFixed(2);
            document.getElementById('liveRate').textContent = newRate + ' ₺';
            document.getElementById('userRate').textContent = newRate + '₺';
            document.getElementById('adminRate').textContent = newRate + '₺';
        }, 5000);
        
        tg.ready();
    </script>

</body></html>
