<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niva Sell Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0f1e;
            color: white;
            min-height: 100vh;
        }
        
        .container {
            padding: 16px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        /* হেডার */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .username {
            color: #00ff88;
            font-weight: 500;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a0f1e;
        }
        
        /* হোম বাটন - নিচে ফিক্সড */
        .home-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #0a0f1e;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
            z-index: 1000;
            width: 90%;
            max-width: 300px;
            text-align: center;
        }
        
        /* সাকসেস কার্ড */
        .success-card {
            background: #1a1f30;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #00ff88;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .success-card:active {
            transform: scale(0.98);
        }
        
        .success-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .success-number {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
        }
        
        /* জয়েন বাটন */
        .join-btn {
            background: #00ff88;
            color: #0a0f1e;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        /* মার্কেট সেকশন */
        .market-section {
            background: #1a1f30;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .market-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .market-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .admin-rate-badge {
            background: #2a2f40;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #00ff88;
        }
        
        .online-badge {
            background: #00ff88;
            color: #0a0f1e;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        /* কয়েন ইনফো */
        .coin-info {
            background: #0f1422;
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
        }
        
        .coin-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00ff88;
        }
        
        .rate-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2a2f40;
            font-size: 18px;
        }
        
        .rate-row:last-child {
            border-bottom: none;
        }
        
        .rate-label {
            color: #888;
        }
        
        .rate-value {
            font-weight: 600;
            color: #00ff88;
        }
        
        /* সেল বাটন */
        .sell-btn {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0a0f1e;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* নেভিগেশন বাটন */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .nav-btn {
            flex: 1;
            background: #1E2333;
            color: white;
            border: 1px solid #2A2F3F;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        
        .nav-btn.active {
            background: #00ff88;
            color: #0a0f1e;
            border-color: #00ff88;
        }
        
        /* অর্ডার হিস্ট্রি পেজ - ২য় ছবির মতো */
        .history-header {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
            margin: 20px 0 30px 0;
            text-align: center;
        }
        
        .history-container {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 80px;
        }
        
        .no-history {
            text-align: center;
            color: #888;
            font-size: 18px;
            padding: 40px;
        }
        
        .no-history-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        /* অর্ডার কার্ড */
        .order-card {
            background: #1E2333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
            border-left: 4px solid;
        }
        
        .order-card.pending {
            border-left-color: #ffaa00;
        }
        
        .order-card.approved {
            border-left-color: #00ff88;
        }
        
        .order-card.rejected {
            border-left-color: #ff4444;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .order-date {
            color: #888;
            font-size: 12px;
        }
        
        .order-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        
        .status-pending {
            background: #ffaa00;
            color: #0a0f1e;
        }
        
        .status-approved {
            background: #00ff88;
            color: #0a0f1e;
        }
        
        .status-rejected {
            background: #ff4444;
            color: white;
        }
        
        .order-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .order-amount {
            font-size: 18px;
            font-weight: bold;
        }
        
        .order-total {
            color: #00ff88;
            font-size: 18px;
            font-weight: bold;
        }
        
        /* ব্যাক বাটন */
        .back-btn {
            background: transparent;
            color: #888;
            border: 1px solid #2A2F3F;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- হোম পেজ - ১ম ছবির মতো -->
    <div id="homePage">
        <div class="container">
            <div class="header">
                <div class="logo">
                    <h1>Niva Sell Bot</h1>
                </div>
                <div class="user-info">
                    <span class="username" id="username">@xhuv0900</span>
                    <div class="avatar" id="avatar">X</div>
                </div>
            </div>

            <!-- SUCCESS কার্ড - ক্লিক করলে হিস্ট্রি পেজে যাবে -->
            <div class="success-card" onclick="showHistoryPage()">
                <div class="success-label">SUCCESS</div>
                <div class="success-number" id="successCount">0</div>
            </div>

            <!-- জয়েন চ্যানেল বাটন -->
            <button class="join-btn" onclick="joinChannel()">
                <span>📢</span> Join Channel Updates, offers & proofs
            </button>

            <!-- মার্কেট সেকশন -->
            <div class="market-section">
                <div class="market-header">
                    <span class="market-title">Coin Market</span>
                    <span class="admin-rate-badge">100K+ = Admin Rate</span>
                </div>
                
                <div class="online-badge">⭕ ONLINE</div>

                <!-- Niva Coin ইনফো -->
                <div class="coin-info">
                    <div class="coin-name">Niva Coin</div>
                    <div class="rate-row">
                        <span class="rate-label">User Rate</span>
                        <span class="rate-value">2.8₮</span>
                    </div>
                    <div class="rate-row">
                        <span class="rate-label">Admin Rate</span>
                        <span class="rate-value">2.8₮</span>
                    </div>
                </div>

                <!-- TAP TO SELL বাটন -->
                <button class="sell-btn" onclick="showSellPage()">TAP TO SELL</button>
            </div>

            <!-- নেভিগেশন বাটন -->
            <div class="nav-buttons">
                <button class="nav-btn active" onclick="showHomePage()">🏠 হোম</button>
                <button class="nav-btn" onclick="showHistoryPage()">📋 হিস্ট্রি</button>
            </div>
        </div>
    </div>

    <!-- সেল ফর্ম পেজ -->
    <div id="sellPage" style="display: none;">
        <div class="container">
            <button class="back-btn" onclick="showHomePage()">← হোম পেজে ফিরুন</button>
            
            <div style="background: #1E2333; border-radius: 20px; padding: 20px; margin-bottom: 20px;">
                <h2 style="color: #00ff88; margin-bottom: 15px;">NIVA BUYER ZONE</h2>
                <p style="color: #888; margin-bottom: 20px;">Sell Niva Coin. Enter your details carefully before submitting.</p>
                
                <div style="background: #2A2F3F; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                    <div style="color: #888; font-size: 12px; margin-bottom: 5px;">📤 SEND COINS TO THIS ID</div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 18px; font-weight: bold; color: #00ff88;">shuvo46637</span>
                        <button onclick="copyToClipboard('shuvo46637')" style="background: #00ff88; color: #0a0f1e; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold;">COPY ID</button>
                    </div>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="color: #888; font-size: 14px; margin-bottom: 5px; display: block;">💰 Amount (Min 1000)</label>
                    <input type="number" id="amount" min="1000" style="width: 100%; background: #2A2F3F; border: none; padding: 15px; border-radius: 10px; color: white; font-size: 16px;" placeholder="Enter amount">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="color: #888; font-size: 14px; margin-bottom: 5px; display: block;">👤 Sender Username</label>
                    <input type="text" id="senderUsername" style="width: 100%; background: #2A2F3F; border: none; padding: 15px; border-radius: 10px; color: white; font-size: 16px;" placeholder="@username">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="color: #888; font-size: 14px; margin-bottom: 5px; display: block;">🏦 Bkash Number</label>
                    <input type="text" id="bkashNumber" style="width: 100%; background: #2A2F3F; border: none; padding: 15px; border-radius: 10px; color: white; font-size: 16px;" placeholder="Enter Bkash number">
                </div>
                
                <div style="background: #2A2F3F; padding: 20px; border-radius: 12px; margin: 20px 0;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="color: #888; font-size: 12px;">Applied Rate</div>
                            <div style="font-size: 20px; font-weight: bold; color: #00ff88;">2.8₮</div>
                        </div>
                        <div>
                            <div style="color: #888; font-size: 12px;">TOTAL</div>
                            <div style="font-size: 20px; font-weight: bold; color: #00ff88;" id="totalAmount">0.00 ₺</div>
                        </div>
                    </div>
                </div>
                
                <button onclick="submitOrder()" style="background: linear-gradient(90deg, #00ff88, #00cc66); color: #0a0f1e; border: none; padding: 18px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; margin-top: 10px;">Next Step →</button>
            </div>
        </div>
    </div>

    <!-- অর্ডার হিস্ট্রি পেজ - ২য় ছবির মতো -->
    <div id="historyPage" style="display: none;">
        <div class="container">
            <button class="back-btn" onclick="showHomePage()">← হোম পেজে ফিরুন</button>
            
            <div class="history-header">FAST NIVA SELL</div>
            
            <div style="background: #1E2333; border-radius: 20px; padding: 20px;">
                <h3 style="color: #00ff88; margin-bottom: 20px;">Order History</h3>
                
                <div id="ordersContainer" class="history-container">
                    <!-- JavaScript দিয়ে অর্ডার দেখানো হবে -->
                </div>
            </div>
        </div>
    </div>

    <!-- হোম বাটন - সব পেজের নিচে ফিক্সড -->
    <button class="home-button" onclick="showHomePage()">🏠 হোম পেজে যান</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ইউজার ইনফো
        const user = tg.initDataUnsafe?.user;
        
        // ইউজারনেম সেট করা
        if (user?.username) {
            document.getElementById('username').textContent = '@' + user.username;
            document.getElementById('senderUsername').value = '@' + user.username;
        }
        
        // অ্যাভাটার সেট
        if (user?.first_name) {
            document.getElementById('avatar').textContent = user.first_name.charAt(0).toUpperCase();
        }
        
        // সাকসেস কাউন্ট লোড
        let successCount = parseInt(localStorage.getItem('successCount_' + (user?.id || 'guest'))) || 0;
        document.getElementById('successCount').textContent = successCount;
        
        // পেজ নেভিগেশন
        function showHomePage() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('sellPage').style.display = 'none';
            document.getElementById('historyPage').style.display = 'none';
            
            // সাকসেস কাউন্ট রিফ্রেশ
            successCount = parseInt(localStorage.getItem('successCount_' + (user?.id || 'guest'))) || 0;
            document.getElementById('successCount').textContent = successCount;
        }
        
        function showSellPage() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('sellPage').style.display = 'block';
            document.getElementById('historyPage').style.display = 'none';
        }
        
        function showHistoryPage() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('sellPage').style.display = 'none';
            document.getElementById('historyPage').style.display = 'block';
            loadOrders();
        }
        
        // অর্ডার লোড করে দেখানো
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders_' + (user?.id || 'guest'))) || [];
            const container = document.getElementById('ordersContainer');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="no-history">
                        <div class="no-history-icon">📭</div>
                        <div>No history found.</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            orders.slice().reverse().forEach(order => {
                let statusClass = '';
                let statusText = '';
                
                if (order.status === 'pending') {
                    statusClass = 'status-pending';
                    statusText = '⏳ Pending';
                } else if (order.status === 'approved') {
                    statusClass = 'status-approved';
                    statusText = '✅ Approved';
                } else {
                    statusClass = 'status-rejected';
                    statusText = '❌ Rejected';
                }
                
                html += `
                    <div class="order-card ${order.status}">
                        <div class="order-header">
                            <span class="order-date">${order.time || new Date().toLocaleDateString()}</span>
                            <span class="order-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="order-details">
                            <span class="order-amount">${order.amount} coins</span>
                            <span class="order-total">${order.total}</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // কপি ফাংশন
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            tg.HapticFeedback.impactOccurred('medium');
            tg.showAlert('✅ কপি করা হয়েছে!');
        }
        
        // জয়েন চ্যানেল
        function joinChannel() {
            tg.HapticFeedback.impactOccurred('light');
            tg.openTelegramLink('https://t.me/incomebd1k');
        }
        
        // টোটাল ক্যালকুলেট
        document.getElementById('amount').addEventListener('input', function(e) {
            const amount = parseFloat(e.target.value) || 0;
            if (amount >= 1000) {
                const total = (amount / 1000) * 2.8;
                document.getElementById('totalAmount').textContent = total.toFixed(2) + ' ₺';
            } else {
                document.getElementById('totalAmount').textContent = '0.00 ₺';
            }
        });
        
        // অর্ডার সাবমিট
        function submitOrder() {
            const amount = document.getElementById('amount').value;
            const username = document.getElementById('senderUsername').value;
            const bkash = document.getElementById('bkashNumber').value;
            
            if (!amount || amount < 1000) {
                tg.showAlert('⚠️ ন্যূনতম 1000 কয়েন দিন');
                return;
            }
            if (!username) {
                tg.showAlert('⚠️ ইউজারনেম দিন');
                return;
            }
            if (!bkash) {
                tg.showAlert('⚠️ বিকাশ নাম্বার দিন');
                return;
            }
            
            const total = (amount / 1000) * 2.8;
            
            const newOrder = {
                id: Date.now(),
                amount: amount + ' coins',
                total: total.toFixed(2) + ' ₺',
                status: 'pending',
                time: new Date().toLocaleDateString('bn-BD')
            };
            
            const orders = JSON.parse(localStorage.getItem('orders_' + (user?.id || 'guest'))) || [];
            orders.push(newOrder);
            localStorage.setItem('orders_' + (user?.id || 'guest'), JSON.stringify(orders));
            
            tg.showAlert('✅ অর্ডার জমা হয়েছে! অ্যাডমিন এপ্রুভ করলে সাকসেস কাউন্ট বাড়বে।');
            
            // ফর্ম ক্লিয়ার
            document.getElementById('amount').value = '';
            document.getElementById('bkashNumber').value = '';
            document.getElementById('totalAmount').textContent = '0.00 ₺';
            
            showHomePage();
        }
    </script>
</body>
                </html>
